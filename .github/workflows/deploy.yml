name: Deploy to Cloudflare

# Push to main -> the site builds with Astro and deploys itself.
# Secrets required (Repo → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   = token with the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID  = your Cloudflare account ID

on:
  push:
    branches: [main]
    paths:
      - 'project/**'
      - 'site/**'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}   # lets you trigger a deploy by hand from the Actions tab

concurrency:
  group: deploy-blogkub
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build site (Astro)
        run: |
          cd site
          npm ci
          npm run build
        # Produces site/dist: 47 pages from shared Astro layouts + all other
        # pages/assets copied from ./project via the prebuild sync step.

      - name: Deploy (wrangler)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          # After cutover, wrangler.jsonc serves ./site/dist (the Astro build).
          command: deploy
