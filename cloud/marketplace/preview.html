<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Preview — BlogKub (Prototype)</title>
<style>
:root{--bg:#0b0d14;--panel:#12141f;--border:rgba(255,255,255,.09);--ink:#eef0f8;--ink2:#9aa1b9;--font:'IBM Plex Sans Thai',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--font);height:100vh;display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border)}
.top .t{font-weight:700;font-size:14px}
.top .sub{color:var(--ink2);font-size:11.5px}
.views{margin-left:auto;display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.views button{padding:7px 16px;background:transparent;border:0;color:var(--ink2);font-family:var(--font);font-size:12.5px;font-weight:700;cursor:pointer}
.views button.on{background:rgba(99,102,241,.25);color:#fff}
.stage{flex:1;overflow:auto;display:flex;justify-content:center;padding:18px}
.frame{background:#fff;border-radius:12px;overflow:auto;box-shadow:0 24px 60px -20px rgba(0,0,0,.8);transition:width .25s;width:min(1080px,100%);height:100%}
.frame.mobile{width:390px}
.note{padding:7px 16px;background:rgba(99,102,241,.12);color:#a5b4fc;font-size:11.5px;text-align:center}
</style>
</head>
<body>
<div class="top">
  <div><div class="t" id="pName">Live Preview</div><div class="sub">เรนเดอร์จากโครงสร้าง JSON จริง + ข้อมูลบทความจำลอง (ไม่ใช่ภาพนิ่ง)</div></div>
  <div class="views"><button class="on" onclick="setView(this,false)">🖥️ Desktop</button><button onclick="setView(this,true)">📱 Mobile</button></div>
</div>
<div class="note">โหมดต้นแบบ: เรนเดอร์แบบย่อจาก blocks + design tokens — เวอร์ชันเต็มจะใช้เอนจิน renderBlockStatic ตัวเดียวกับ Builder</div>
<div class="stage"><div class="frame" id="frame"></div></div>

<script>
var qs=new URLSearchParams(location.search), API=qs.get("api")||"", ID=qs.get("id")||"";

/* ---------- mock data (Dynamic Mock Data) ---------- */
var MOCK={posts:[
  {t:"7 วิธีทำให้เว็บไซต์โหลดเร็วขึ้นในปี 2026",cat:"เทคนิค"},
  {t:"สรุปเทรนด์ดีไซน์เว็บที่มาแรงที่สุด",cat:"ดีไซน์"},
  {t:"เริ่มเขียนบล็อกยังไงให้มีคนอ่าน",cat:"ไลฟ์สไตล์"},
  {t:"รีวิวเครื่องมือฟรีสำหรับครีเอเตอร์",cat:"รีวิว"},
  {t:"Google อัปเดตใหม่ SEO ต้องรู้อะไรบ้าง",cat:"ข่าว"},
  {t:"จัดโต๊ะทำงานให้ครีเอทีฟขึ้น 200%",cat:"ไอเดีย"}]};

/* เดโม่ state — ใช้เมื่อไม่ได้ต่อ API */
var DEMO_STATE={name:"Demo Template",design:{primary:"#6366f1",accent:"#8b5cf6",radius:12},
  blocks:[{type:"header",props:{logoText:"MyBlog"}},{type:"hero",props:{title:"ยินดีต้อนรับสู่บล็อกของเรา",subtitle:"แบ่งปันความรู้ บทความคุณภาพ อัปเดตใหม่ทุกสัปดาห์"}},
  {type:"postgrid",props:{heading:"บทความล่าสุด",columns:3}},{type:"footer",props:{copyright:"© 2026 MyBlog"}}]};

function load(){
  if(API&&ID){fetch(API+"/api/projects/"+ID,{credentials:"include"}).then(r=>r.json())
    .then(j=>render(j.state||DEMO_STATE,j.name||"Preview")).catch(()=>render(DEMO_STATE,"Demo"));}
  else render(DEMO_STATE,"Demo Template");
}

function render(S,name){
  document.getElementById("pName").textContent="Live Preview — "+name;
  var d=S.design||{},pr=d.primary||"#6366f1",ac=d.accent||"#8b5cf6",r=(d.radius!=null?d.radius:12)+"px";
  var h="";
  (S.blocks||[]).forEach(function(b){var p=b.props||{};
    if(b.type==="header")h+='<div style="display:flex;align-items:center;gap:18px;padding:14px 22px;border-bottom:1px solid #eee"><b style="color:'+pr+';font-size:19px">'+esc(p.logoText||"MyBlog")+'</b><span style="margin-left:auto;color:#666;font-size:13px">หน้าแรก · บทความ · เกี่ยวกับ · ติดต่อ</span></div>';
    else if(b.type==="hero")h+='<div style="padding:56px 24px;background:linear-gradient(120deg,'+pr+'14,'+ac+'22)"><div style="max-width:920px;margin:0 auto"><h1 style="font-size:clamp(26px,4vw,40px);color:#1f2937;line-height:1.15;margin-bottom:12px">'+esc(p.title||"หัวข้อหลักของเว็บไซต์")+'</h1><p style="color:#556;max-width:460px;margin-bottom:22px">'+esc(p.subtitle||"")+'</p><span style="display:inline-block;background:'+pr+';color:#fff;padding:11px 26px;border-radius:'+r+';font-weight:600;font-size:14px">'+esc(p.btnText||"อ่านบทความล่าสุด")+'</span></div></div>';
    else if(b.type==="featured"){var f=MOCK.posts[0];h+='<div style="padding:34px 24px"><div style="max-width:1040px;margin:0 auto"><h2 style="border-left:4px solid '+pr+';padding-left:12px;font-size:19px;margin-bottom:16px;color:#1f2937">'+esc(p.heading||"บทความแนะนำ")+'</h2><div style="display:grid;grid-template-columns:2fr 1fr;gap:12px"><div style="position:relative;border-radius:'+r+';min-height:250px;background:linear-gradient(135deg,'+pr+','+ac+');display:flex;align-items:flex-end"><div style="padding:18px;color:#fff"><span style="background:'+pr+';font-size:10px;padding:3px 9px;border-radius:3px;font-weight:700">'+f.cat+'</span><div style="font-size:20px;font-weight:800;margin-top:8px;text-shadow:0 2px 12px rgba(0,0,0,.6)">'+f.t+'</div></div></div><div style="display:flex;flex-direction:column;gap:10px">'+[1,2].map(i=>'<div style="flex:1;border-radius:'+r+';background:linear-gradient(135deg,'+ac+','+pr+');display:flex;align-items:flex-end;min-height:118px"><div style="padding:12px;color:#fff;font-weight:700;font-size:13.5px;text-shadow:0 2px 10px rgba(0,0,0,.6)">'+MOCK.posts[i].t+'</div></div>').join("")+'</div></div></div></div>';}
    else if(b.type==="postgrid")h+='<div style="padding:34px 24px"><div style="max-width:1040px;margin:0 auto"><h2 style="font-size:20px;margin-bottom:16px;color:#1f2937">'+esc(p.heading||"บทความล่าสุด")+'</h2><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px">'+MOCK.posts.slice(0,6).map(x=>'<div style="border:1px solid #eee;border-radius:'+r+';overflow:hidden;background:#fff"><div style="height:110px;background:linear-gradient(120deg,'+pr+'22,'+ac+'33)"></div><div style="padding:12px"><div style="color:'+pr+';font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">'+x.cat+'</div><div style="font-weight:700;font-size:14.5px;color:#1f2937;margin:4px 0 6px;line-height:1.35">'+x.t+'</div><span style="color:'+pr+';font-size:12.5px;font-weight:600">อ่านต่อ →</span></div></div>').join("")+'</div></div></div>';
    else if(b.type==="postlist")h+='<div style="padding:26px 24px"><div style="max-width:1040px;margin:0 auto"><h2 style="font-size:18px;margin-bottom:10px;color:#1f2937">'+esc(p.heading||"อ่านต่อ")+'</h2>'+MOCK.posts.slice(0,4).map(x=>'<div style="display:flex;gap:10px;align-items:center;border-bottom:1px solid #eee;padding:10px 0"><span style="background:'+pr+';color:#fff;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;flex:none">'+x.cat+'</span><span style="font-size:14px;color:#1f2937;font-weight:600">'+x.t+'</span><span style="margin-left:auto;color:#999;font-size:12px">5 ก.ค.</span></div>').join("")+'</div></div>';
    else if(b.type==="about")h+='<div style="padding:36px 24px;background:#f8f7f2"><div style="max-width:760px;margin:0 auto;display:flex;gap:18px;align-items:center"><div style="width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,'+pr+','+ac+');flex:none"></div><div><div style="color:'+pr+';font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">เกี่ยวกับผู้เขียน</div><div style="font-size:19px;font-weight:800;color:#1f2937">'+esc(p.name||"ผู้เขียน")+'</div><div style="color:#556;font-size:13.5px;margin-top:4px">'+esc(p.bio||"แบ่งปันความรู้ผ่านบทความคุณภาพ")+'</div></div></div></div>';
    else if(b.type==="footer")h+='<div style="background:#0f172a;color:#fff;padding:30px 24px"><div style="max-width:1040px;margin:0 auto;display:flex;gap:20px;flex-wrap:wrap;justify-content:space-between"><div><b>'+esc(p.logoText||"MyBlog")+'</b><div style="color:#94a3b8;font-size:12.5px;margin-top:5px">'+esc(p.about||"")+'</div></div><div style="color:#94a3b8;font-size:12.5px">หน้าแรก · บทความ · ติดต่อ</div></div><div style="text-align:center;color:#64748b;font-size:11.5px;border-top:1px solid rgba(255,255,255,.08);margin-top:18px;padding-top:12px">'+esc(p.copyright||"© 2026")+'</div></div>';
  });
  document.getElementById("frame").innerHTML=h;
}
function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function setView(btn,mobile){document.querySelectorAll(".views button").forEach(b=>b.classList.remove("on"));btn.classList.add("on");document.getElementById("frame").classList.toggle("mobile",mobile)}
load();
</script>
</body>
</html>
